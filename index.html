<!DOCTYPE html>
<html>
<head>
    <title>Career Readiness Score Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Career Readiness Score Analyzer</h1>

    <form action="/calculate" method="POST">

        <label>Name</label>
        <input type="text" name="name" required>

        <label>Skills Count</label>
        <input type="number" name="skills" min="0" max="10" required>

        <label>Projects Count</label>
        <input type="number" name="projects" min="0" max="10" required>

        <label>Certifications Count</label>
        <input type="number" name="certifications" min="0" max="10" required>

        <label>CGPA</label>
        <input type="number" step="0.1" name="cgpa" min="0" max="10" required>

        <button type="submit">Calculate Score</button>

    </form>

</div>

</body>
</html>
